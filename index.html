<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΕΠΑΛ Καστοριάς - Daylight Controller</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #00e5ff;
            --orange: #ff9800;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: #eee;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 450px;
        }
        h1 { font-size: 2.5rem; text-align: center; color: var(--accent); margin-bottom: 20px; }
        h2 { font-size: 2rem; text-align: center; color: var(--accent); margin-bottom: 20px; }
        
        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: center;
        }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; }
        
        button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            background: #333;
            color: white;
        }
        button:active { transform: scale(0.98); }
        #toggle { background: #d32f2f; }
        #auto { background: #388e3c; }

        label { display: block; margin: 15px 0 5px; font-size: 0.9rem; opacity: 0.8; }
        input[type=range] { width: 100%; cursor: pointer; }
        input[type=color] {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 8px;
            background: none;
            cursor: pointer;
        }
        
        .status-bar {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #mode { color: var(--orange); }
    </style>
</head>
<body>

    <div class="container">
        <h1>ΕΠΑΛ Καστοριάς</h1>
        <h2>Ελεγκτής φωτός</h2>

        <div class="status-bar">
            Λειτουργία: <span id="mode">--</span>
        </div>

        <div class="card">
            <div class="stats-grid">
                <div>
                    <div class="stat-label">Θερμοκρασία</div>
                    <div class="stat-val"><span id="temp">--</span>°C</div>
                </div>
                <div>
                    <div class="stat-label">Υγρασία</div>
                    <div class="stat-val"><span id="hum">--</span>%</div>
                </div>
            </div>
        </div>

        <button id="toggle">ON / OFF (STOP)</button>
        <button id="auto">Εναλλαγή Auto Mode</button>

        <div id="manual-controls" class="card">
            <label>Φωτεινότητα</label>
            <input type="range" id="brightness" min="0" max="1" step="0.05">
            
            <label>Χρώμα LED</label>
            <input type="color" id="color-picker" value="#ffffff">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
